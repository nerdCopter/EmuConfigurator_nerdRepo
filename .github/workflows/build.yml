on:
  push:
    tags:
      - 'v*'
      - 'test-*'
    branches:
      - main
      - develop
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

name: Build EmuConfigurator (Electron)
jobs:
  build:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    # Using Node.js 24.x (latest LTS as of March 2026)
    # https://nodejs.org/en/about/releases/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13, windows-latest]
        include:
          - os: ubuntu-latest
            artifact-suffix: linux-x64
          - os: macos-latest
            artifact-suffix: macos-arm64
          - os: macos-13
            artifact-suffix: macos-x86_64
          - os: windows-latest
            artifact-suffix: windows-x64
    outputs:
      buildtag: ${{ steps.build-info.outputs.tag }}
      shortsha: ${{ steps.build-info.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Info
        id: build-info
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [ "$TAG" = "$GITHUB_REF" ]; then TAG="$GITHUB_RUN_NUMBER"; fi
          SHA=$(git rev-parse --short HEAD)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'yarn'

      - name: Setup Linux (rpm, build tools)
        if: runner.os == 'Linux'
        run: sudo apt update && sudo apt install -y rpm build-essential python3 libudev-dev

      - name: Yarn Install
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint
        continue-on-error: true

      - name: Build Distribution
        run: yarn build

      - name: Make Packages
        env:
          APPLE_SIGNING_ENTITLEMENTS: ./sign/entitlements.plist
          # For certificate-based signing, set these as GitHub secrets:
          # APPLE_SIGNING_IDENTITY: "Apple Distribution: [Team Name]"
          # APPLE_TEAM_ID: "XXXXXXXXXX"
          # WINDOWS_CERT_FILE: path to EmuCert.p12
          # WINDOWS_CERT_PASSWORD: certificate password
        run: yarn make
        # Packages built (CI only builds what works cross-platform):
        # macOS: .zip (portable, DMG skipped - requires native macos-alias module)
        # Windows: .exe (Squirrel.Windows - delta-update framework, app launches after setup by design)
        # Linux: .deb, .rpm (native package managers)

      - name: Validate Artifacts Exist
        if: runner.os != 'Windows'
        run: |
          if [ ! -d "out/make" ] || [ -z "$(find out/make -type f 2>/dev/null | head -1)" ]; then
            echo "❌ ERROR: No artifacts found in out/make/"
            exit 1
          fi
          echo "✓ Artifacts validated"

      # Upload Linux .deb
      - name: Upload Artifact (linux .deb)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmuConfigurator-linux-deb
          path: out/make/deb/**/*.deb
          retention-days: 30

      # Upload Linux .rpm
      - name: Upload Artifact (linux .rpm)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmuConfigurator-linux-rpm
          path: out/make/rpm/**/*.rpm
          retention-days: 30

      # Upload Linux .zip
      - name: Upload Artifact (linux .zip)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmuConfigurator-linux-zip
          path: out/make/zip/**/*.zip
          retention-days: 30

      # Upload macOS .dmg
      - name: Upload Artifact (macos .dmg)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmuConfigurator-macos-dmg
          path: out/make/dmg/**/*.dmg
          retention-days: 30

      # Upload macOS .zip
      - name: Upload Artifact (macos .zip)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmuConfigurator-macos-zip
          path: out/make/zip/**/*.zip
          retention-days: 30

      # Upload Windows .exe
      - name: Upload Artifact (windows .exe)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmuConfigurator-windows-exe
          path: out/make/squirrel.windows/**/*.exe
          retention-days: 30

      # Upload Windows .zip
      - name: Upload Artifact (windows .zip)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmuConfigurator-windows-zip
          path: out/make/zip/**/*.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./Artifacts

      - name: List Release Artifacts
        run: |
          echo "### Release Artifacts ###"
          find ./Artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" \) -exec ls -lh {} \;

      - name: Upload Release Assets (.exe, .dmg, .deb, .rpm)
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: "EmuConfigurator ${{ github.ref_name }}"
          files: |
            ./Artifacts/EmuConfigurator-windows-x64/out/make/squirrel.windows/**/*.exe
            ./Artifacts/EmuConfigurator-macos-x64/out/make/dmg/**/*.dmg
            ./Artifacts/EmuConfigurator-linux-x64/out/make/deb/**/*.deb
            ./Artifacts/EmuConfigurator-linux-x64/out/make/rpm/**/*.rpm
          draft: true
          prerelease: ${{ contains(github.ref, 'test') || contains(github.ref, 'rc') }}
        continue-on-error: true
