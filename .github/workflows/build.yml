on:
  push:
    tags:
      - 'v*'
      - 'test-*'
    branches:
      - main
      - develop
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

name: Build EmuConfigurator (Electron)
jobs:
  build:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact-suffix: linux-x64
          - os: macos-latest
            artifact-suffix: macos-x64
          - os: windows-latest
            artifact-suffix: windows-x64
    outputs:
      buildtag: ${{ steps.build-info.outputs.tag }}
      shortsha: ${{ steps.build-info.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Info
        id: build-info
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [ "$TAG" = "$GITHUB_REF" ]; then TAG="$GITHUB_RUN_NUMBER"; fi
          SHA=$(git rev-parse --short HEAD)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Linux (rpm, build tools)
        if: runner.os == 'Linux'
        run: sudo apt update && sudo apt install -y rpm build-essential python3 libudev-dev

      - name: Yarn Install
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint
        continue-on-error: true

      - name: Build Distribution
        run: yarn build

      - name: Make Packages
        env:
          APPLE_SIGNING_ENTITLEMENTS: ./sign/entitlements.plist
          # For certificate-based signing, set these as GitHub secrets:
          # APPLE_SIGNING_IDENTITY: "Apple Distribution: [Team Name]"
          # APPLE_TEAM_ID: "XXXXXXXXXX"
          # WINDOWS_CERT_FILE: path to EmuCert.p12
          # WINDOWS_CERT_PASSWORD: certificate password
        run: yarn make
        # Packages built (CI only builds what works cross-platform):
        # macOS: .zip (portable, DMG skipped - requires native macos-alias module)
        # Windows: .exe (Squirrel.Windows)
        # Linux: .deb, .rpm (native package managers)

      - name: Upload Artifacts (build to Actions)
        uses: actions/upload-artifact@v4
        with:
          name: EmuConfigurator-${{ matrix.artifact-suffix }}
          path: out/make/
          retention-days: 30
        continue-on-error: true

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./Artifacts

      - name: List Release Artifacts
        run: |
          echo "### Release Artifacts ###"
          find ./Artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" \) -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: "EmuConfigurator ${{ github.ref }}"
          draft: true
          prerelease: false
          body: |
            ## EmuConfigurator Release
            
            Build artifacts (ZIP files) are available via [Actions](https://github.com/nerdCopter/EmuConfigurator_nerdRepo/actions/runs/${{ github.run_id}}).
            
            ### Commit
            ${{ needs.build.outputs.shortsha }}

      - name: Upload Release Assets (.exe, .dmg, .deb, .rpm)
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./Artifacts/EmuConfigurator-windows-x64/out/make/squirrel.windows/**/*.exe
            ./Artifacts/EmuConfigurator-macos/out/make/dmg/**/*.dmg
            ./Artifacts/EmuConfigurator-linux-x64/out/make/deb/**/*.deb
            ./Artifacts/EmuConfigurator-linux-x64/out/make/rpm/**/*.rpm
          draft: true
          prerelease: ${{ contains(github.ref, 'test') || contains(github.ref, 'rc') }}
        continue-on-error: true
