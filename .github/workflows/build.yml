on:
  push:
    tags:
      - 'v*'
      - 'test-*'
    branches:
      - main
      - develop
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

name: Build EmuConfigurator (Electron)
jobs:
  build:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    # Using Node.js 24.x (latest LTS as of March 2026)
    # https://nodejs.org/en/about/releases/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-26-intel, windows-latest]
        include:
          - os: ubuntu-latest
            artifact-suffix: linux-x64
          - os: macos-latest
            artifact-suffix: macos-arm64
          - os: macos-26-intel
            artifact-suffix: macos-x86_64
          - os: windows-latest
            artifact-suffix: windows-x64
    outputs:
      buildtag: ${{ steps.build-info.outputs.tag }}
      shortsha: ${{ steps.build-info.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Info
        id: build-info
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [ "$TAG" = "$GITHUB_REF" ]; then TAG="$GITHUB_RUN_NUMBER"; fi
          SHA=$(git rev-parse --short HEAD)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'yarn'

      - name: Setup Linux (rpm, build tools)
        if: runner.os == 'Linux'
        run: sudo apt update && sudo apt install -y rpm build-essential python3 libudev-dev

      - name: Yarn Install
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint
        continue-on-error: true

      - name: Build Distribution
        run: yarn build

      - name: Make Packages
        env:
          APPLE_SIGNING_ENTITLEMENTS: ./sign/entitlements.plist
          # For certificate-based signing, set these as GitHub secrets:
          # APPLE_SIGNING_IDENTITY: "Apple Distribution: [Team Name]"
          # APPLE_TEAM_ID: "XXXXXXXXXX"
          # WINDOWS_CERT_FILE: path to EmuCert.p12
          # WINDOWS_CERT_PASSWORD: certificate password
        run: yarn make
        # Packages built (CI only builds what works cross-platform):
        # macOS: .zip (portable, DMG skipped - requires native macos-alias module)
        # Windows: .exe (Squirrel.Windows - delta-update framework, app launches after setup by design)
        # Linux: .deb, .rpm (native package managers)

      - name: Restructure .zip Artifacts (flatten OS folders)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ROOT_DIR=$(pwd)
          ZIP_DIR="$ROOT_DIR/out/make/zip"
          
          # Use nullglob to safely handle no matches
          shopt -s nullglob
          zipfiles=( "$ZIP_DIR"/*/*.zip )
          shopt -u nullglob
          
          if [ ${#zipfiles[@]} -eq 0 ]; then
            echo "⚠ No .zip files found in $ZIP_DIR - skipping restructure"
            exit 0
          fi
          
          for zipfile in "${zipfiles[@]}"; do
            basename=$(basename "$zipfile")
            dirname=$(dirname "$zipfile")
            tmpdir=$(mktemp -d) || { echo "✗ FAILED: mktemp failed"; exit 1; }
            
            echo "Processing: $zipfile"
            
            # Unzip with error handling
            if ! unzip -q "$zipfile" -d "$tmpdir"; then
              echo "✗ FAILED: unzip failed for $zipfile"
              rm -rf "$tmpdir"
              exit 1
            fi
            
            # Find the first directory safely
            if ! cd "$tmpdir"; then
              echo "✗ FAILED: cannot cd to tmpdir $tmpdir"
              rm -rf "$tmpdir"
              exit 1
            fi
            
            # Find first directory using a robust method
            app_folder=$(find . -maxdepth 1 -type d ! -name '.' -print -quit)
            if [ -z "$app_folder" ]; then
              echo "✗ FAILED: no app folder found in $tmpdir for $zipfile"
              cd "$ZIP_DIR"
              rm -rf "$tmpdir"
              exit 1
            fi
            
            app_folder="${app_folder#./}"  # Remove leading ./
            if ! cd "$app_folder"; then
              echo "✗ FAILED: cannot cd to app folder $app_folder in $tmpdir"
              cd "$ZIP_DIR"
              rm -rf "$tmpdir"
              exit 1
            fi
            
            # Re-zip with error handling
            if ! zip -r -q "../../${basename}" .; then
              echo "✗ FAILED: zip failed for $zipfile in app folder $app_folder"
              cd "$ZIP_DIR"
              rm -rf "$tmpdir"
              exit 1
            fi
            
            # Return to zip directory
            if ! cd "$ZIP_DIR"; then
              echo "✗ FAILED: cannot return to $ZIP_DIR"
              rm -rf "$tmpdir"
              exit 1
            fi
            
            # Cleanup
            rm -rf "$tmpdir" || { echo "⚠ Warning: failed to remove tmpdir $tmpdir"; }
            echo "✓ Restructured: $basename"
          done
          
          echo "✓ All .zip files restructured (OS folders removed)"

      - name: Restructure Windows .zip Artifacts
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $zipPath = "out\make\zip"
          if (Test-Path $zipPath) {
            Get-ChildItem "$zipPath\*\*.zip" | ForEach-Object {
              $zipFile = $_.FullName
              $parentDir = Split-Path $zipFile -Parent
              $zipName = Split-Path $zipFile -Leaf
              $tmpDir = Join-Path ([System.IO.Path]::GetTempPath()) ([System.IO.Path]::GetRandomFileName())
              New-Item -ItemType Directory -Path $tmpDir -Force | Out-Null
              Expand-Archive -Path $zipFile -DestinationPath $tmpDir
              $appFolder = Get-ChildItem -Directory $tmpDir | Select-Object -First 1
              $newZipPath = Join-Path $parentDir $zipName
              Remove-Item $zipFile -Force
              Compress-Archive -Path (Join-Path $appFolder.FullName "*") -DestinationPath $newZipPath -Force
              Remove-Item $tmpDir -Recurse -Force
            }
            Write-Host "✓ Windows .zip files restructured (OS folders removed)"
          }

      - name: Validate Artifacts Exist
        if: runner.os != 'Windows'
        run: |
          if [ ! -d "out/make" ] || [ -z "$(find out/make -type f 2>/dev/null | head -1)" ]; then
            echo "❌ ERROR: No artifacts found in out/make/"
            exit 1
          fi
          echo "✓ Artifacts validated"

      - name: Validate Artifacts Exist (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $files = Get-ChildItem -Path "out/make" -Recurse -File
          if ($files.Count -eq 0) {
            Write-Error "No artifacts found in out/make/"
            exit 1
          }
          Write-Host "✓ Artifacts validated (Windows)"

      # Upload Linux .deb
      - name: Upload Artifact (linux .deb)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmuConfigurator-linux-deb
          path: out/make/deb/**/*.deb
          retention-days: 30

      # Upload Linux .rpm
      - name: Upload Artifact (linux .rpm)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmuConfigurator-linux-rpm
          path: out/make/rpm/**/*.rpm
          retention-days: 30

      # Upload Linux .zip
      - name: Upload Artifact (linux .zip)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmuConfigurator-linux-zip
          path: out/make/zip/**/*.zip
          retention-days: 30

      # Upload macOS ARM64 .zip
      - name: Upload Artifact (macos arm64 .zip)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmuConfigurator-macos-arm64-zip
          path: out/make/zip/**/*.zip
          retention-days: 30

      # Upload macOS x86_64 .zip
      - name: Upload Artifact (macos x86_64 .zip)
        if: matrix.os == 'macos-26-intel'
        uses: actions/upload-artifact@v4
        with:
          name: EmuConfigurator-macos-x86_64-zip
          path: out/make/zip/**/*.zip
          retention-days: 30

      # Upload Windows .exe
      - name: Upload Artifact (windows .exe)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmuConfigurator-windows-exe
          path: out/make/squirrel.windows/**/*.exe
          retention-days: 30

      # Upload Windows .zip
      - name: Upload Artifact (windows .zip)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmuConfigurator-windows-zip
          path: out/make/zip/**/*.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./Artifacts

      - name: List Release Artifacts
        run: |
          echo "### Release Artifacts ###"
          find ./Artifacts -type f \( -name "*.exe" -o -name "*.deb" -o -name "*.rpm" -o -name "*.zip" \) -exec ls -lh {} \;

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: "EmuConfigurator ${{ github.ref_name }}"
          files: |
            ./Artifacts/EmuConfigurator-windows-exe/out/make/squirrel.windows/**/*.exe
            ./Artifacts/EmuConfigurator-windows-zip/out/make/zip/**/*.zip
            ./Artifacts/EmuConfigurator-macos-arm64-zip/out/make/zip/**/*.zip
            ./Artifacts/EmuConfigurator-macos-x86_64-zip/out/make/zip/**/*.zip
            ./Artifacts/EmuConfigurator-linux-deb/out/make/deb/**/*.deb
            ./Artifacts/EmuConfigurator-linux-rpm/out/make/rpm/**/*.rpm
            ./Artifacts/EmuConfigurator-linux-zip/out/make/zip/**/*.zip
          draft: true
          prerelease: ${{ contains(github.ref, 'rc') }}
        continue-on-error: false

      - name: Release Failed Notification
        if: failure()
        run: |
          echo "❌ Release upload failed for ${{ github.ref_name }}"
          exit 1
